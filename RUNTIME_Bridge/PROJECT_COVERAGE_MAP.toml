[coverage]
schema_version = 1
status_values = ["OBSERVADO", "PARCIAL", "AUSENTE"]
fallback_alias = "@F"
ci_provider_policy = "DETECT"
never_claim_total_coverage = true

[[specialists]]
id = "PKG"
alias = "@PKG"
source = "PKG_PackageSDK/PKG_Agent_PackageCLISDK.md"
wrapper = ".codex/agents/package-cli-sdk.toml"
scope = "CLI products, packages, libraries and SDKs"
excludes = ["HTTP backend domain ownership", "desktop application lifecycle"]

[[specialists]]
id = "DE"
alias = "@DE"
source = "DE_DataEngineering/DE_Agent_DataPipeline.md"
wrapper = ".codex/agents/data-pipeline.toml"
scope = "ETL/ELT, batch/stream pipelines, lineage, replay and data quality"
excludes = ["application database migrations", "ML model training"]

[[specialists]]
id = "ML"
alias = "@ML"
source = "ML_MLEngineering/ML_Agent_MLEngineering.md"
wrapper = ".codex/agents/ml-engineering.toml"
scope = "classical machine learning and MLOps"
excludes = ["LLM prompts and RAG", "generic ETL ownership"]

[[specialists]]
id = "MKT"
alias = "@MKT"
source = "MKT_Marketing/MKT_Agent_SEOGrowthStrategist.md"
wrapper = ".codex/agents/marketing-seo-growth.toml"
scope = "marketing sites, landing pages, SEO, persona-fit, conversion copy and growth evidence"
excludes = ["visual design system ownership", "paid media account operations", "guaranteed ranking claims"]

[[specialists]]
id = "IAC"
alias = "@IAC"
source = "IAC_PlatformEngineering/IAC_Agent_InfrastructureAsCode.md"
wrapper = ".codex/agents/infrastructure-as-code.toml"
scope = "Infrastructure as Code, state, plan/apply, drift and policy"
excludes = ["generic production operations", "application environment values"]

[[profiles]]
id = "WEB_FRONTEND"
label = "Web frontend"
status = "OBSERVADO"
scenario = "WEB_FRONTEND_ROUTE"
owners = ["@D"]
gates = ["@A", "@GSD", "@Q", "@S", "@P", "@V"]
tests = ["unit/component", "accessibility", "browser E2E only for critical browser UI"]
release = ["detected CI provider", "web deploy or static publication"]
limitations = ["framework-specific behavior still requires repository evidence"]
fallback = []
evidence = ["D_Design/D_Agent_Design.md", "Q_Quality/Q_Agent_TestEngineer.md"]

[[profiles]]
id = "MARKETING_LANDING"
label = "Marketing site and landing page"
status = "OBSERVADO"
scenario = "MARKETING_LANDING_ROUTE"
owners = ["@MKT", "@MKT:persona", "@D"]
gates = ["@SPEC", "@GSD", "@Q", "@S", "@P", "@BI", "@V"]
tests = ["content/SEO audit", "metadata/schema validation", "accessibility", "browser smoke for web UI", "analytics event smoke when configured"]
release = ["detected web deploy or static publication", "Search Console/analytics follow-up when available"]
limitations = ["SEO evidence and SERP behavior require current official/source validation; rankings are never guaranteed"]
fallback = []
evidence = ["MKT_Marketing/MKT_Agent_SEOGrowthStrategist.md", "MKT_Marketing/MKT_Agent_PersonaConversionStrategist.md", "D_Design/D_Agent_Design.md"]

[[profiles]]
id = "API_BACKEND"
label = "Backend and API"
status = "OBSERVADO"
scenario = "API_BACKEND_ROUTE"
owners = ["@B"]
gates = ["@A", "@DATA", "@GSD", "@Q", "@S", "@P", "@O", "@V"]
tests = ["unit/domain", "API/contract", "integration", "load smoke when risk requires"]
release = ["detected CI provider", "deployable service release"]
limitations = ["framework and deployment provider must be discovered"]
fallback = []
evidence = ["B_BackendDomain/B_Agent_BackendDomain.md", "O_Observability/O_Agent_DeployObservability.md"]

[[profiles]]
id = "WORKER_AUTOMATION"
label = "Workers, jobs and automations"
status = "OBSERVADO"
scenario = "WORKER_AUTOMATION_ROUTE"
owners = ["@B", "@O"]
gates = ["@A", "@DATA", "@GSD", "@Q", "@S", "@P", "@O", "@V"]
tests = ["unit/domain", "queue or scheduler integration", "idempotency/retry/replay", "failure and recovery smoke"]
release = ["detected CI provider", "worker, scheduler or automation deployment"]
limitations = ["queue, scheduler and serverless provider semantics require repository evidence"]
fallback = []
evidence = ["B_BackendDomain/B_Agent_BackendDomain.md", "O_Observability/O_Agent_DeployObservability.md"]

[[profiles]]
id = "MOBILE"
label = "Mobile applications"
status = "OBSERVADO"
scenario = "MOBILE_ROUTE"
owners = ["@M", "@IOS"]
gates = ["@A", "@GSD", "@Q", "@S", "@P", "@REG", "@REL", "@V"]
tests = ["unit", "integration", "device or emulator smoke", "store/release checks"]
release = ["detected mobile channel", "store, enterprise, beta or sideload as applicable"]
limitations = ["platform-specific signing and policy require the matching specialist"]
fallback = []
evidence = ["M_MobilePlaystore/M_Agent_MobilePlaystore.md", "IOS_AppleAppstore/IOS_Agent_AppleNativeAppstore.md"]

[[profiles]]
id = "DESKTOP"
