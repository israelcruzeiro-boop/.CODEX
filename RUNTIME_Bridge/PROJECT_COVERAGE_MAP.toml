[[profile_scenarios]]
id = "WEB_FRONTEND_ROUTE"
profile = "WEB_FRONTEND"
expected_status = "OBSERVADO"
expected_owners = ["@D"]
fixture = "Browser user interface with components, navigation, accessibility states and a detected frontend build."
expected_route = "Route visual ownership to @D and activate only the gates supported by the repository and risk."
expected_limit = "Framework-specific behavior and browser tooling still require direct repository evidence."

[[profile_scenarios]]
id = "MARKETING_LANDING_ROUTE"
profile = "MARKETING_LANDING"
expected_status = "OBSERVADO"
expected_owners = ["@MKT", "@MKT:persona", "@D"]
fixture = "Marketing site or landing page with persona, search intent, on-page SEO, structured data, conversion copy, proof, CTA, and browser-accessible user experience."
expected_route = "Route growth, SEO and messaging to @MKT/@MKT:persona while visual implementation and accessibility stay coordinated with @D."
expected_limit = "Search evidence, Google guidance and competitor SERP behavior must be revalidated at execution time; no ranking guarantee is allowed."

