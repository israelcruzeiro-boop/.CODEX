[runtime]
kit_name = "Codex Agent Kit"
schema_version = 1
kit_version = "1.1.0"
release_date = "2026-07-16"
python_requires = ">=3.11"
supported_os = ["linux", "windows"]
source_of_truth = "AGENTS.md"
codex_wrappers = ".codex/agents"
claude_wrappers = ".claude/agents"
skills = "skills"
coverage_map = "RUNTIME_Bridge/PROJECT_COVERAGE_MAP.toml"

[policy]
keep_original_agents_as_source = true
create_skill_per_agent = false
validate_before_release = true
codex_and_claude_required = true
complete_source_read_required = true

[verdicts]
canonical = ["APROVADO", "APROVADO_COM_RESSALVAS", "QUESTIONAR", "REPROVADO"]
forbidden = ["APROVADO_COM_LACUNAS", "BLOQUEADO", "PASS_COM_RESSALVAS", "PASS", "FAIL"]
contract_files = [
  "A_Architecture/A_Method_ModularArchitecture.md",
  "A_Architecture/A_Method_PatternMap.md",
  "C_Cetico/C_Agent_Cetico.md",
  "C10_Maestro/C10_Method_SDD.md",
  "DOC_Documentation/DOC_Agent_ProjectDocumentationArchitect.md",
  "DE_DataEngineering/DE_Agent_DataPipeline.md",
  "GSD_DeliveryDiscipline/GSD_Agent_TDDCLIAuditor.md",
  "IAC_PlatformEngineering/IAC_Agent_InfrastructureAsCode.md",
  "ML_MLEngineering/ML_Agent_MLEngineering.md",
  "P_Performance/P_Agent_PerformanceValidator.toml",
  "PKG_PackageSDK/PKG_Agent_PackageCLISDK.md",
  "S_Seguranca/S_Agent_SecurityValidator.toml",
  "SPEC_Specs/SPEC_Agent_SpecArchitect.md",
  "SUP_Supervisor/SUP_Method_MultiAgentDelivery.md",
  "T_Templates/T_Template_CLI_AUDIT.md",
  "T_Templates/T_Template_SPEC.md",
  "V_Validation/V_Agent_FinalValidator.toml",
  "V_Validation/V_Agent_ImpactValidator.toml",
  "skills/gsd-tdd-cli-harness/SKILL.md",
]

[[skills]]
name = "agent-forge"
path = "skills/agent-forge/SKILL.md"
purpose = "Create, evolve, validate, and promote reusable agents."

[[skills]]
name = "architecture-blueprint"
path = "skills/architecture-blueprint/SKILL.md"
purpose = "Model AS-IS and TO-BE architecture, module boundaries, contracts, dependency rules, patterns, and fitness functions."

[[skills]]
name = "codex-agent-kit"
path = "skills/codex-agent-kit/SKILL.md"
purpose = "Select agents, enforce governance, and coordinate the kit."

[[skills]]
name = "gsd-tdd-cli-harness"
path = "skills/gsd-tdd-cli-harness/SKILL.md"
purpose = "Turn implementation work into acceptance criteria and CLI evidence."

[[skills]]
name = "multi-agent-delivery"
path = "skills/multi-agent-delivery/SKILL.md"
purpose = "Plan and execute bounded multi-agent DAGs with context envelopes, ownership, joins, reconciliation, and evidence."

[[skills]]
name = "spec-driven-breakdown"
path = "skills/spec-driven-breakdown/SKILL.md"
purpose = "Break product intent into traceable executable specs, tasks, tests, risks, and evidence."

