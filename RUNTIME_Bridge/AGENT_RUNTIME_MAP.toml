[bridge]
codex_structured_source = ".codex/agents/*.toml"
claude_generated_shape = ".claude/agents/*.md"
source_reference_rule = "Every wrapper must reference both installed-kit and kit-root paths for its manifest source."
full_source_rule = "Every wrapper must require reading its selected source file completely before acting."
skill_reference_rule = "Skills must reference source files instead of duplicating agent bodies."
