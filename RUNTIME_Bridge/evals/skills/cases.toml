expected_outputs = ["minimal-route decision", "skipped ceremonial gates", "proportional validation"]
evidence_required = ["decision:minimal-governance", "route:specialist-or-direct"]
validators = ["N/A - boundary case validates proportional routing, not kit mutation"]

[[cases]]
id = "KIT-NEG-001"
skill = "codex-agent-kit"
