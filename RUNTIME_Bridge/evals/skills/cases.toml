schema_version = 1
required_skills = [
  "agent-forge",
  "architecture-blueprint",
  "codex-agent-kit",
  "gsd-tdd-cli-harness",
  "multi-agent-delivery",
  "spec-driven-breakdown",
]

[coverage]
minimum_total_per_skill = 4
minimum_trigger_per_skill = 2
minimum_boundary_per_skill = 1
minimum_negative_per_skill = 1

# `evidence_required` is an exact contract for an observed forward-test result.
# Validating this manifest proves coverage and case integrity; passing a results
# TOML to the runner proves the recorded invocation and output evidence.
# Results use run-level `run_id`, `executor`, `executed_at` and one
# `[[results]]` per case with: `case_id`, `invoked_skills`, `decision`
# (`INVOKED`/`SKIPPED`), concrete `reason`, `outcome = "PASS"`,
# `output_contract`, `evidence`, and `validator_results` inline tables
# (`path`, `exit_code`). Use `--require-results` when execution proof is a gate.

[[cases]]
id = "AF-TRG-001"
skill = "agent-forge"
kind = "trigger"
expected_invocation = "REQUIRED"
prompt = "A recurring data-quality gap has appeared in five projects and no current agent covers more than half of it. Create and integrate a focused agent."
fixture = "Agent catalog plus five anonymized recurrence records and a measured coverage matrix."
expected_contract = "AGENT_CHANGE"
expected_outputs = ["creation-gate decision", "agent source", "Codex and Claude wrappers", "validation result"]
evidence_required = ["decision:creation-gate", "artifact:agent-source", "command:validate-arsenal"]
validators = ["RUNTIME_Bridge/scripts/validate_arsenal.py"]

[[cases]]
id = "AF-TRG-002"
skill = "agent-forge"
kind = "trigger"
expected_invocation = "REQUIRED"
prompt = "Audit and repair an existing promoted agent whose triggers no longer match its wrappers, then validate runtime parity."
fixture = "Existing source agent, divergent wrappers, manifest entry, and prior work-audit evidence."
expected_contract = "AGENT_CHANGE"
expected_outputs = ["audit findings", "minimal source or wrapper repair", "runtime parity evidence"]
evidence_required = ["artifact:agent-source", "artifact:runtime-wrappers", "command:validate-arsenal"]
validators = ["RUNTIME_Bridge/scripts/validate_arsenal.py"]

[[cases]]
id = "AF-BND-001"
skill = "agent-forge"
kind = "boundary"
expected_invocation = "CONDITIONAL"
prompt = "A specialist gap may recur, but only one incident is documented. Decide whether to create an agent or route the work to the closest existing role."
fixture = "One incident report and the current agent capability catalog."
expected_contract = "ROUTE_DECISION"
expected_outputs = ["70 percent coverage assessment", "create-or-route decision", "missing evidence"]
evidence_required = ["decision:creation-gate", "route:existing-agent-or-forge"]
validators = ["N/A - decision-only boundary case has no generated runtime artifact"]

[[cases]]
id = "AF-NEG-001"
skill = "agent-forge"
kind = "negative"
expected_invocation = "FORBIDDEN"
prompt = "Fix a one-off typo in a README and run the repository Markdown check."
fixture = "Single Markdown file with one misspelled word."
expected_contract = "ROUTE_DECISION"
expected_outputs = ["direct minimal-task route without agent creation"]
evidence_required = ["route:direct-task", "decision:no-new-agent"]
validators = ["N/A - negative routing case generates no agent artifact"]

[[cases]]
id = "ARCH-TRG-001"
skill = "architecture-blueprint"
kind = "trigger"
expected_invocation = "REQUIRED"
prompt = "Design a greenfield marketplace architecture with explicit modules, contracts, data ownership, consistency, patterns, ADRs, and fitness gates."
fixture = "Product requirements, actors, NFR targets, compliance constraints, and no existing code."
expected_contract = "ARCHITECTURE_PACKAGE"
expected_outputs = ["TARGET_ARCHITECTURE.md", "PATTERN_MAP.md", "material ADRs", "validator evidence"]
evidence_required = ["artifact:target-architecture", "artifact:pattern-map", "command:validate-architecture"]
validators = ["RUNTIME_Bridge/scripts/validate_architecture.py"]

[[cases]]
id = "ARCH-TRG-002"
skill = "architecture-blueprint"
kind = "trigger"
expected_invocation = "REQUIRED"
prompt = "Map the AS-IS boundaries of a brownfield monolith, identify cross-writes and cycles, and propose a rollback-safe modular transition."
fixture = "Repository tree, manifests, schemas, imports, routes, deploy config, and representative tests."
expected_contract = "ARCHITECTURE_PACKAGE"
expected_outputs = ["evidence-derived ARCHITECTURE.md", "separate target architecture", "dependency graph", "transition gates"]
evidence_required = ["artifact:asis-architecture", "artifact:target-architecture", "command:validate-architecture"]
validators = ["RUNTIME_Bridge/scripts/validate_architecture.py"]

[[cases]]
id = "ARCH-BND-001"
skill = "architecture-blueprint"
kind = "boundary"
expected_invocation = "CONDITIONAL"
prompt = "Rename an internal helper used by one module; first decide whether this changes a public boundary or architecture artifact."
fixture = "Helper definition, all consumers, module public API, and current architecture docs."
expected_contract = "ROUTE_DECISION"
expected_outputs = ["boundary-impact decision", "minimal artifact update decision", "evidence paths"]
evidence_required = ["decision:architecture-impact", "evidence:consumer-scan"]
validators = ["N/A - validator runs only if the boundary decision changes architecture artifacts"]

[[cases]]
id = "ARCH-NEG-001"
skill = "architecture-blueprint"
kind = "negative"
expected_invocation = "FORBIDDEN"
prompt = "Change a button label and its translation key without changing routes, state, contracts, or module boundaries."
fixture = "One component, locale entries, and focused UI tests."
expected_contract = "ROUTE_DECISION"
expected_outputs = ["direct design or localization route"]
evidence_required = ["route:design-localization", "decision:no-architecture-change"]
validators = ["N/A - negative case has no architecture artifact"]

[[cases]]
