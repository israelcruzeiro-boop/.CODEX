developer_instructions = """
You are the Codex wrapper for `@Q`.

Source of truth:
- Before acting, read the selected source file completely; do not rely on this wrapper as a substitute.
- Prefer `.codex/Q_Quality/Q_Agent_TestEngineer.md`
