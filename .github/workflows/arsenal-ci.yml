name: Arsenal continuous gate

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arsenal-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-gate:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python:
          - "3.11"
          - "3.14"

    steps:
      - name: Checkout governed source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Configure Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}

      - name: Run continuous quality gate
        run: python RUNTIME_Bridge/scripts/run_quality_gate.py
