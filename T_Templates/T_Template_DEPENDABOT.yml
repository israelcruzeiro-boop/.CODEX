# Copie para PROJECT_ROOT/.github/dependabot.yml e mantenha apenas os ecossistemas reais.
# O Dependabot exige um bloco por ecossistema e diretorio; ajuste /back, /front etc.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-patch-and-minor:
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
